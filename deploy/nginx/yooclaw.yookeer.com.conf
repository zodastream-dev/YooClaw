server {
    server_name yooclaw.yookeer.com;
    root /opt/YooClaw/dist;
    client_max_body_size 50m;
    index index.html;

    # API routes — proxy to Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # AI compatibility route
    location /v2/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # Generated content pages — proxy to Express backend
    location /web/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    location /game/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # Generated videos — only match real video files, not frontend routes
    location ~ ^/videos/[^/]+\.(mp4|webm|mov)$ {
        root /opt/YooClaw/public;
        add_header Cache-Control "public, max-age=604800";
        types { video/mp4 mp4; video/webm webm; }
    }

    location /p/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/yooclaw.yookeer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yooclaw.yookeer.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = yooclaw.yookeer.com) { return 301 https://$host$request_uri; }
    listen 80;
    server_name yooclaw.yookeer.com;
    return 404;
}
